<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Chart Analyst</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --container-bg: #151a22;
            --accent-blue: #00a2ff;
            --accent-green: #00ff88;
            --accent-red: #ff3b30;
            --text-main: #ffffff;
            --text-muted: #8a96a3;
            --border-color: #242f3d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            background: var(--container-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .lang-select {
            background: #1c2430;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .badge-trial {
            background: rgba(0, 162, 255, 0.15);
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }

        .title-block {
            margin-bottom: 20px;
        }

        .title-block h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .title-block p {
            color: var(--text-muted);
            font-size: 13px;
        }

        /* ОБНОВЛЕННАЯ КНОПКА ЗАГРУЗКИ */
        .upload-container {
            position: relative;
            margin-bottom: 20px;
            width: 100%;
        }

        .upload-zone {
            border: 2px dashed #313e50;
            border-radius: 16px;
            padding: 30px 15px;
            background: transparent;
            transition: all 0.2s ease;
            pointer-events: none; /* Пропускает клики сквозь себя на инпут */
            position: relative;
            z-index: 1;
        }

        /* Настоящий, рабочий инпут. Растянут на всю область кнопки, но абсолютно невидим */
        .real-file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
            z-index: 10; /* Находится на самом верху, перехватывая физический клик */
        }

        .upload-container:active .upload-zone {
            transform: scale(0.98);
            border-color: var(--accent-blue);
            background: rgba(0, 162, 255, 0.02);
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .upload-text {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .upload-sub {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Status & Analysis Card */
        .analysis-card {
            display: none;
            background: #1c2430;
            border-radius: 16px;
            padding: 20px 15px;
            margin-bottom: 20px;
            border: 1px solid var(--border-color);
            text-align: left;
        }

        .loader-spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-text {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        .status-step {
            font-size: 16px;
            font-weight: 600;
        }

        /* Signal results styling */
        .signal-result {
            text-align: center;
        }

        .signal-badge {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .signal-badge.call {
            background: rgba(0, 255, 136, 0.15);
            color: var(--accent-green);
            border: 1px solid var(--accent-green);
        }

        .signal-badge.put {
            background: rgba(255, 59, 48, 0.15);
            color: var(--accent-red);
            border: 1px solid var(--accent-red);
        }

        .signal-badge.error {
            background: rgba(255, 179, 0, 0.15);
            color: #ffb300;
            border: 1px solid #ffb300;
        }

        .signal-metric {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
            background: #151a22;
            padding: 10px;
            border-radius: 12px;
        }

        .metric-item span {
            display: block;
            font-size: 11px;
            color: var(--text-muted);
        }

        .metric-item strong {
            font-size: 15px;
            color: var(--text-main);
        }

        .signal-descr {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* Buttons */
        .btn-invite {
            display: block;
            width: 100%;
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            margin-bottom: 12px;
            transition: background 0.2s;
        }

        .btn-invite:active {
            background: rgba(0, 162, 255, 0.1);
        }

        .btn-buy {
            display: block;
            width: 100%;
            background: var(--accent-blue);
            border: none;
            color: #ffffff;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
        }

        .btn-buy:active {
            background: #0086d4;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <select class="lang-select" id="lang-select">
                <option value="en">🇬🇧 English</option>
                <option value="ru">🇷🇺 Русский</option>
                <option value="es">🇪🇸 Español</option>
            </select>
            <span class="badge-trial">7 Days Trial</span>
        </div>

        <div class="title-block">
            <h1>AI Analyst v1.0</h1>
            <p id="user-id">ID: Loading...</p>
        </div>

        <div class="upload-container" id="upload-container">
            <input type="file" class="real-file-input" id="file-input" accept="image/*">
            
            <div class="upload-zone">
                <span class="upload-icon">📸</span>
                <div class="upload-text">Upload chart screenshot</div>
                <div class="upload-sub">Camera snapshot or Photo Library</div>
            </div>
        </div>

        <div class="analysis-card" id="analysis-card">
            </div>

        <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.3;">
            Invite 3 friends and get +3 days of unlimited AI analysis for free!
        </p>

        <button class="btn-invite" id="btn-invite">Invite Friends</button>
        <button class="btn-buy" id="btn-buy">Extend Unlimited ($29 / mo)</button>
    </div>

    <script>
        // Init Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand(); // Разворачиваем на весь экран
            tg.ready();
            
            const userId = tg.initDataUnsafe?.user?.id || Math.floor(1000000 + Math.random() * 9000000);
            document.getElementById('user-id').innerText = `ID: ${userId}`;
        } else {
            document.getElementById('user-id').innerText = `ID: 74920148`;
        }

        const uploadContainer = document.getElementById('upload-container');
        const fileInput = document.getElementById('file-input');
        const analysisCard = document.getElementById('analysis-card');

        // Обработка выбранного файла (срабатывает сразу после выбора из галереи или фото)
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                startAnalysisFlow();
            }
        });

        // Функция симуляции анализа
        async function startAnalysisFlow() {
            uploadContainer.style.display = 'none';
            analysisCard.style.display = 'block';
            analysisCard.innerHTML = `
                <div style="text-align: center; padding: 10px 0;">
                    <div class="loader-spinner"></div>
                    <div class="status-text">INITIATING SENSORS...</div>
                    <div class="status-step" id="status-step">Uploading file to Neural Network...</div>
                </div>
            `;

            const steps = [
                "Scanning screenshot matrix...",
                "Checking image resolution and quality...",
                "Searching for chart candlesticks...",
                "Analyzing RSI and MACD indicators...",
                "Calculating mathematical trend probability..."
            ];

            for (let i = 0; i < steps.length; i++) {
                await delay(1200);
                document.getElementById('status-step').innerText = steps[i];
            }

            await delay(1000);
            showRandomResult();
        }

        function delay(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // Вывод случайного результата (сигнал или ошибки)
        function showRandomResult() {
            const outcomes = [
                `
                <div class="signal-result">
                    <div class="signal-badge call">📈 CALL (BUY)</div>
                    <div class="signal-metric">
                        <div class="metric-item"><span>Accuracy</span><strong>89.4%</strong></div>
                        <div class="metric-item"><span>Duration</span><strong>2-3 min</strong></div>
                    </div>
                    <p class="signal-descr"><strong>AI Conclusion:</strong> 'Double Bottom' pattern confirmed on support levels. RSI indicator shows solid bullish divergence in the oversold zone.</p>
                </div>
                `,
                `
                <div class="signal-result">
                    <div class="signal-badge put">📉 PUT (SELL)</div>
                    <div class="signal-metric">
                        <div class="metric-item"><span>Accuracy</span><strong>84.7%</strong></div>
                        <div class="metric-item"><span>Duration</span><strong>3-5 min</strong></div>
                    </div>
                    <p class="signal-descr"><strong>AI Conclusion:</strong> Strong price rejection at critical resistance level. MACD lines bearish crossover detected. Volume decreasing.</p>
                </div>
                `,
                `
                <div class="signal-result">
                    <div class="signal-badge error">⚠️ RESOLUTION ERROR</div>
                    <div style="text-align: left; margin-top: 10px;">
                        <p class="signal-descr" style="color: #ffb300; font-weight: bold; margin-bottom: 5px;">Analysis Failed: Blurry Image</p>
                        <p class="signal-descr">The uploaded image is too blurry or pixelated. The AI cannot precisely trace the borders of Japanese candlesticks. Please upload a clear screen capture.</p>
                    </div>
                </div>
                `,
                `
                <div class="signal-result">
                    <div class="signal-badge error">⚠️ TIMEFRAME ERROR</div>
                    <div style="text-align: left; margin-top: 10px;">
                        <p class="signal-descr" style="color: #ffb300; font-weight: bold; margin-bottom: 5px;">Analysis Failed: No Timeframe</p>
                        <p class="signal-descr">Neural Network could not locate the chart timeframe (M1, M5, H1, etc.). Please make sure the menu indicating the time interval is fully visible on your screenshot.</p>
                    </div>
                </div>
                `,
                `
                <div class="signal-result">
                    <div class="signal-badge error">⚠️ INDICATORS MISSING</div>
                    <div style="text-align: left; margin-top: 10px;">
                        <p class="signal-descr" style="color: #ffb300; font-weight: bold; margin-bottom: 5px;">Analysis Failed: No Indicators</p>
                        <p class="signal-descr">To provide high-probability signals, the AI requires data from trading oscillators. Please turn on **RSI** or **MACD** on your platform and try again.</p>
                    </div>
                </div>
                `
            ];

            const randomOutcome = outcomes[Math.floor(Math.random() * outcomes.length)];
            analysisCard.innerHTML = randomOutcome;

            const resetBtn = document.createElement('button');
            resetBtn.className = 'btn-invite';
            resetBtn.style.marginTop = '15px';
            resetBtn.innerText = 'Analyze Another Chart';
            resetBtn.onclick = () => {
                uploadContainer.style.display = 'block';
                analysisCard.style.display = 'none';
                fileInput.value = '';
            };
            analysisCard.appendChild(resetBtn);
        }

        // Кнопка "Invite Friends"
        document.getElementById('btn-invite').addEventListener('click', () => {
            if (tg) {
                const botUsername = "AI_Analyst_Bot"; // Замени на юзернейм своего бота без @
                const refLink = `https://t.me/${botUsername}?start=ref_${tg.initDataUnsafe?.user?.id || 123456}`;
                tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(refLink)}&text=${encodeURIComponent("Check out this crazy AI that scans and analyzes chart screenshots on the go! 🔥")}`);
            } else {
                alert('Telegram Share triggered');
            }
        });

        // Кнопка "Extend Unlimited"
        document.getElementById('btn-buy').addEventListener('click', () => {
            if (tg) {
                tg.showAlert('Payment interface will be available in the next release!');
            } else {
                alert('Open payment gateway');
            }
        });
    </script>
</body>
</html>
